name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static site
        run: |
          mkdir .pages-output
          rsync -a \
            --exclude .git \
            --exclude .pages-output \
            --exclude CNAME \
            --exclude archived/legacy-site/openzt2/zt-byte-range-map.tsv \
            ./ .pages-output/
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .pages-output --project-name=over-yonder-tech --branch=main
